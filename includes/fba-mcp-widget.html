<script>
(function () {
  if (window.__fbaLensBoot) return;
  window.__fbaLensBoot = true;

  function loadLens() {
    var globalLink = document.querySelector('link[href*="global.css"]');
    var root = globalLink
      ? globalLink.getAttribute('href').replace(/styles\/global\.css.*$/, '')
      : '/';
    var s = document.createElement('script');
    s.src = root + 'public/scripts/fba-lens-widget.js?v=5';
    s.defer = true;
    s.dataset.endpoint = 'https://fba-mcp.throbbing-thunder-4d33.workers.dev/widget/mcp';
    s.dataset.buttonLabel = 'Ask Anything';
    document.body.appendChild(s);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadLens);
  } else {
    loadLens();
  }
})();
</script>
