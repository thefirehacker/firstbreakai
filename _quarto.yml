project:
  type: website
  output-dir: docs
  resources:
    - robots.txt
    - _redirects
    - public/transcripts/**
    - public/scripts/**
  render:
    - "*.qmd"
    - "blog/*.qmd"
    - "project-watch/*.qmd"
    - "office-hours/*.qmd"
    - "lessons/*.qmd"
    - "!temp/"
    - "!journey/"
  post-render:
    - scripts/rewrite-sitemap.mjs
    - scripts/rewrite-html-links.mjs

website:
  title: "First Break AI"
  description: "A free, open cohort to learn AI by doing — inference, training, and AI product building. No prerequisites, follow the roadmap and build in the open."
  site-url: "https://cohort.bubblnet.com/"
  favicon: public/images/favicon_io/favicon.ico
  google-analytics: "G-VB604Y51JX"
  repo-url: "https://github.com/thefirehacker/firstbreakai"
  repo-actions: [edit, source]
  open-graph:
    image: public/images/Fort-Journey-01.png
    locale: en_US
  twitter-card:
    card-style: summary_large_image
    image: public/images/Fort-Journey-01.png
    creator: "@thefirehacker"
    site: "@thefirehacker"
  navbar:
    background: primary
    logo: public/images/favicon_io/favicon-32x32.png
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: roadmap.qmd
        text: Roadmap
      - href: lessons/index.qmd
        text: Lessons
      - href: checklist.qmd
        text: Checklist
      - href: setup.qmd
        text: AI Setup
      - href: blog/index.qmd
        text: Blog
      - href: project-watch/index.qmd
        text: Project Watch
      - href: office-hours/index.qmd
        text: Office Hours
    right:
      - href: sponsors.qmd
        text: Sponsors
      - href: teams.qmd
        text: Teams
      - icon: discord
        href: "https://discord.gg/hRPese4H3F"
        text: Discord
      - icon: github
        href: "https://github.com/thefirehacker/firstbreakai"
        text: Repo
  page-footer:
    left: "© 2026 First Break AI — Powered by [fetchlens.ai](https://fetchlens.ai)"
    center:
      - text: "Sponsors"
        href: sponsors.qmd
      - text: "Teams"
        href: teams.qmd
      - text: "Terms"
        href: terms.qmd
      - text: "Privacy"
        href: privacy.qmd
      - text: "Cookies"
        href: cookies.qmd
      - text: "Community"
        href: community-guidelines.qmd
    right: "contact@bubblspace.com"

lightbox: auto

format:
  html:
    css:
      - styles/global.css
      - styles/fba-lens-widget.css
    include-in-header:
      - includes/schema.html
    filters:
      - canonical.lua
    include-after-body:
      - includes/fba-mcp-widget.html
      - includes/mermaid-zoom.html
      - includes/github-card.html
      - includes/lesson-player.html
    mermaid:
      theme: neutral
